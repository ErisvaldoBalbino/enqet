@if (tipoEnquete === 'duas-opcoes') {

  <div class="flex gap-3">
    @for (opcao of opcoes; track opcao.texto) {
      <button
        (click)="votar(opcao.texto)"
        class="flex-1 group rounded-xl border-2 border-accent/20 bg-accent/5 px-4 py-4 text-center transition-all hover:border-accent hover:bg-accent/10 hover:shadow-sm active:scale-[0.97] cursor-pointer"
      >
        <span class="block text-sm font-medium text-text group-hover:text-accent transition-colors">{{ opcao.texto }}</span>
        <span class="block mt-1.5 text-xs font-semibold text-accent">{{ opcao.votos }} votos</span>
      </button>
    }
  </div>

} @else {

  <div class="space-y-2">
    @for (opcao of opcoes; track opcao.texto) {
      <label
        class="flex items-center gap-3 rounded-lg border border-border px-4 py-3 cursor-pointer transition-all hover:border-accent/40 hover:bg-accent/5"
        [class.border-accent]="opcaoSelecionada === opcao.texto"
        [class.bg-accent/5]="opcaoSelecionada === opcao.texto"
      >
        <input
          type="radio"
          name="votoMultiplo"
          [value]="opcao.texto"
          [(ngModel)]="opcaoSelecionada"
          class="accent-accent w-4 h-4"
        >
        <span class="flex-1 text-sm text-text">{{ opcao.texto }}</span>
        <span class="text-xs font-medium text-text-muted bg-surface rounded-full px-2.5 py-0.5">{{ opcao.votos }} votos</span>
      </label>
    }

    <button
      (click)="votarMultiplo()"
      [disabled]="!opcaoSelecionada"
      class="mt-3 w-full rounded-lg bg-accent text-white font-medium px-4 py-2.5 text-sm transition-all cursor-pointer hover:bg-accent/90 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed"
    >
      Confirmar Voto
    </button>
  </div>

}
