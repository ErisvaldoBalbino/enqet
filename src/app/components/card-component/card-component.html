<div class="bg-surface-card rounded-2xl shadow-sm border border-border overflow-hidden transition-shadow hover:shadow-md">
  <div class="px-5 pt-5 pb-3 border-b border-border/60">
    <h3 class="text-lg font-semibold text-primary-dark m-0 leading-tight">
      <ng-content select="[titulo]"></ng-content>
    </h3>
    <p class="text-xs text-text-muted mt-1">
      Criado em: {{ dataCriacao() | date:'dd/MM/yyyy HH:mm' }}
    </p>
  </div>

  <div class="px-5 py-4">
    <ng-content></ng-content>
  </div>
</div>
